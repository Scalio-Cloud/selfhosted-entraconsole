server {
    listen 80;
    server_name entraconsole.domain.com;

    # Wichtig für die Let's Encrypt Validierung
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Alles andere auf HTTPS umleiten
    location / {
        return 301 https://$host$request_uri;
    }

}

server {
    listen 443 ssl;
    server_name entraconsole.domain.com;

    # Pfade zu den von Certbot generierten Zertifikaten
    ssl_certificate /etc/letsencrypt/live/entraconsole.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entraconsole.domain.com/privkey.pem;

    # Optimale SSL-Einstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend:80; # Interner Docker-Name und Port des Frontends
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


location /api/agent {
    # Behebt das doppelte /api/api, falls das Frontend/der Agent das mitsendet
    rewrite ^/api/api(.*)$ /api$1 break;

    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}


location /api/auth/sso/ {
    rewrite ^/api/api(.*)$ /api$1 break;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}


    # Falls das Frontend direkt mit dem Backend im Browser kommuniziert, 
    # muss ggf. auch das Backend über den Proxy laufen (z.B. unter /api),
    # oder das Backend bleibt separat auf Port 8000 (dann aber auch mit SSL absichern!).
    # Hier die Variante, falls das Backend via /api geroutet werden soll:
    location /api {

        # 2. Schutz für alle anderen API-Routen:
        # Prüfen, ob der Request von Ihrer eigenen Webseite kommt.
        # Wenn NICHT (bzw. wenn der Referer leer ist oder von woanders kommt), blockieren mit 403 Forbidden.
        if ($http_referer !~* "^https://entraconsole\.domain\.com") {
          return 403;
        }

         # 3. Reguläre Verarbeitung für verifizierte Frontend-Requests
         rewrite ^/api/api(.*)$ /api$1 break;
         proxy_pass http://backend:8000;
         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;

    }
}